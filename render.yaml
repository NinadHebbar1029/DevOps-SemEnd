services:
  # Backend API Service
  - type: web
    name: mindease-backend
    env: docker
    region: oregon # Or your preferred Render region
    plan: free # Change if needed
    dockerfilePath: ./Dockerfile
    # Root directory is implicitly the repository root
    envVars:
      - key: ENVIRONMENT
        value: production

  # Frontend Web Service
  - type: web
    name: mindease-frontend
    env: docker
    region: oregon
    plan: free
    rootDir: frontend # This tells Render to look inside the frontend/ folder
    dockerfilePath: ./Dockerfile # Looks for frontend/Dockerfile
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: mindease-backend
          envVarKey: RENDER_EXTERNAL_URL
