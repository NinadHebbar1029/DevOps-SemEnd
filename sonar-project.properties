# =============================================
# SonarQube Project Configuration
# MindEase Mental Health Chatbot
# =============================================

sonar.projectKey=mindease-chatbot
sonar.projectName=MindEase Mental Health Chatbot
sonar.projectVersion=1.0

# Source directories to analyze
sonar.sources=api.py,src

# Exclusions (don't analyse large data files, generated reports, or JS frontend)
sonar.exclusions=\
  **/node_modules/**,\
  data/**,\
  models/**,\
  reports/**,\
  frontend/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  src/train_models.py,\
  src/evaluate_models.py,\
  src/roc_auc.py

# Python version
sonar.python.version=3.11

# Encoding
sonar.sourceEncoding=UTF-8
